name: CI

on:
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - run: npm ci
            - run: npm run build
            - run: npm run lint
            - run: lerna run test
