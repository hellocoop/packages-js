name: Canary

on:
    workflow_dispatch:
        inputs:
            preid:
                description: 'Pre-release identifier'
                required: false
                default: 'canary'

permissions:
    contents: read
    id-token: write

jobs:
    canary:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
                  registry-url: 'https://registry.npmjs.org'
            - run: npm install -g npm@latest
            - run: npm ci
            - run: npm run build
            - run: lerna run test
            - name: Publish canary packages
              run: lerna publish --canary --preid ${{ inputs.preid }} --yes --no-private --ignore @hellocoop/web-identity
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
