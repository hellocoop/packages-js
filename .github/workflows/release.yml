name: Release

on:
    release:
        types: [published]

permissions:
    contents: read
    id-token: write

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npm run build
            - run: lerna run test

    publish:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
                  registry-url: 'https://registry.npmjs.org'
            - run: npm install -g npm@latest
            - run: npm ci
            - run: npm run build
            - name: Publish packages with provenance (OIDC Trusted Publishing)
              run: lerna publish from-package --yes --no-private
