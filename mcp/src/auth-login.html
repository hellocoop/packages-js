<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellō MCP Authentication</title>
    <link href="https://cdn.hello.coop/css/hello-btn.css" rel="stylesheet"/>
    <script src="https://cdn.hello.coop/js/hello-btn.js"></script>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #303330;
        --border-color: #303030;
        --card-bg: #ffffff;
      }
      
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #151515;
          --text-color: #d4d4d4;
          --border-color: #808080;
          --card-bg: #151515;
        }
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        line-height: 1.6;
      }
      
      .auth-container {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 40px;
        max-width: 400px;
        width: 100%;
        text-align: center;
      }
      
      .logo {
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-color);
      }
      
      .subtitle {
        opacity: 0.7;
        font-size: 14px;
        margin-bottom: 32px;
      }
      
      .auth-description {
        margin-bottom: 32px;
        font-size: 16px;
      }
      
      .hello-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      
      .hello-btn {
        text-decoration: none;
      }
      
      .security-note {
        opacity: 0.7;
        font-size: 12px;
        margin-top: 16px;
        line-height: 1.4;
      }
      
      .footer {
        opacity: 0.7;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-color);
        font-size: 12px;
      }
      
      @media (prefers-color-scheme: dark) {
        .hello-about {
          color: #d4d4d4;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="logo">Hellō</div>
      <div class="subtitle">MCP Server Authorization</div>
      
      <p class="auth-description">
        You need to authenticate with Hellō to access the MCP server tools and manage your applications.
      </p>
      
      <div class="hello-container">
        <a href="{{AUTH_URL}}" class="hello-btn hello-btn-black-and-static">
          ō&nbsp;&nbsp;Continue with Hellō
        </a>
        <button class="hello-about" title="About Hellō"></button>
      </div>
      
      <div class="security-note">
        Your authentication is secure and handled by Hellō's trusted identity platform.
      </div>
      
      <div class="footer">
        Powered by <strong>Hellō</strong> • <a href="https://www.hello.coop" target="_blank" rel="noopener" style="color: inherit;">Learn more</a>
      </div>
    </div>
  </body>
</html>
